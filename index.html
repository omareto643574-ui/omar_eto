<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>OMAR Eto</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- صفحة الدخول -->
<div id="loginPage">
    <h1>🔥 OMAR Eto 🔥</h1>
    <input type="text" id="username" placeholder="اسمك">
    <button onclick="login()">دخول</button>
</div>

<!-- صفحة اللعبة -->
<div id="gamePage" style="display:none;">

<h2 id="welcome"></h2>

<div id="timer">04:00</div>

<div class="scoreboard">
    <div>🔴 الأحمر: <span id="redScore">0</span></div>
    <div>🔵 الأزرق: <span id="blueScore">0</span></div>
</div>

<div class="points">
    <div>نقط الأحمر: <span id="redPoints">0</span></div>
    <div>نقط الأزرق: <span id="bluePoints">0</span></div>
</div>

<div class="field">
    <div class="center-line"></div>
    <div class="center-circle"></div>
</div>

<div class="buttons">
    <button onclick="startMatch()">ابدأ ماتش</button>
    <button onclick="goal('red')">جول 🔴</button>
    <button onclick="goal('blue')">جول 🔵</button>
    <button onclick="card('yellow')">🟨</button>
    <button onclick="card('red')">🟥</button>
    <button onclick="resetGame()">Reset</button>
</div>

</div>

<audio id="whistle" src="https://www.soundjay.com/misc/sounds/whistle-01.mp3"></audio>
<audio id="crowd" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
